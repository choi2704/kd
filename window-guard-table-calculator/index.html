<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>강동자바라 스텐 방범창 견적계산기</title>
<style>
:root{--brand:#0f4c81;--brand2:#17324d;--line:#dce3ea;--bg:#f5f7fa;--danger:#c62828}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;color:#17212b}
.wrap{max-width:860px;margin:0 auto;padding:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 8px 24px rgba(0,0,0,.05);margin-bottom:16px}
h1{font-size:26px;margin:0 0 8px}
.sub{color:#5c6975;font-size:14px;line-height:1.5}
.step{font-size:16px;font-weight:800;margin:22px 0 10px}
.materials{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.material{border:2px solid var(--line);border-radius:14px;padding:15px;cursor:pointer}
.material.active{border-color:var(--brand);background:#eef6fc}
.material input{margin-right:7px}
.material strong{display:block;margin-bottom:4px}
.material small{color:#65727e}
.grid{display:grid;grid-template-columns:1fr 1fr 130px;gap:10px}
label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
input[type=number]{width:100%;height:48px;border:1px solid #bec9d3;border-radius:10px;padding:0 12px;font-size:17px}
button,a.btn{border:0;border-radius:11px;height:48px;padding:0 16px;font-size:15px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
.primary{background:var(--brand);color:#fff}
.secondary{background:#e9eef3;color:#25394a}
.dark{background:var(--brand2);color:#fff}
.full{width:100%}
.result{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}
.result>div{background:#f2f6f9;border-radius:12px;padding:14px}
.result span{display:block;font-size:12px;color:#687683;margin-bottom:5px}
.result strong{font-size:20px}
.notice{margin-top:12px;padding:12px 14px;border-radius:10px;background:#fff6df;font-size:13px;line-height:1.5}
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
th,td{padding:10px 7px;border-bottom:1px solid var(--line);text-align:center}
th{background:#f3f6f8}
.delete{color:var(--danger);background:none;height:auto;padding:4px}
.total{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:2px solid #263f55}
.total strong{font-size:26px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.empty{padding:25px 5px;text-align:center;color:#7d8993}
@media(max-width:640px){
 .wrap{padding:10px} .card{padding:17px;border-radius:14px}
 .grid{grid-template-columns:1fr 1fr} .grid .qty{grid-column:1/-1}
 .result{grid-template-columns:1fr} .actions{grid-template-columns:1fr}
 table{font-size:12px} th,td{padding:8px 3px}
 h1{font-size:22px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>스텐 방범창 견적계산기</h1>
    <div class="sub">SUS201 또는 SUS304를 선택하고 실측 가로·세로를 입력하세요. 가격표의 100mm 구간 기준으로 계산됩니다.</div>

    <div class="step">1. 재질 선택</div>
    <div class="materials">
      <label class="material active" id="m201">
        <strong><input type="radio" name="material" value="201" checked> SUS201</strong>
        <small>기본가 54,000원부터</small>
      </label>
      <label class="material" id="m304">
        <strong><input type="radio" name="material" value="304"> SUS304</strong>
        <small>기본가 63,000원부터</small>
      </label>
    </div>

    <div class="step">2. 창문 규격 입력</div>
    <div class="grid">
      <div><label for="width">가로 (mm)</label><input id="width" type="number" min="1" max="2400" placeholder="예: 1550"></div>
      <div><label for="height">세로 (mm)</label><input id="height" type="number" min="1" max="2400" placeholder="예: 1650"></div>
      <div class="qty"><label for="qty">수량</label><input id="qty" type="number" min="1" value="1"></div>
    </div>

    <div class="result">
      <div><span>선택 재질</span><strong id="rMaterial">SUS201</strong></div>
      <div><span>1개 단가</span><strong id="rUnit">0원</strong></div>
      <div><span>입력 수량 금액</span><strong id="rSubtotal">0원</strong></div>
    </div>
    <div class="notice" id="guide">입력 가능 범위: 가로·세로 각각 1~2,400mm</div>
    <button class="primary full" id="addBtn" style="margin-top:12px">＋ 창문 추가하기</button>
  </div>

  <div class="card">
    <div class="step" style="margin-top:0">창문 목록</div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>No.</th><th>재질</th><th>가로</th><th>세로</th><th>수량</th><th>단가</th><th>금액</th><th>삭제</th></tr></thead>
        <tbody id="list"><tr><td colspan="8" class="empty">창문을 추가해주세요.</td></tr></tbody>
      </table>
    </div>
    <div class="total"><span>총 예상금액</span><strong id="grandTotal">0원</strong></div>
    <div class="sub" style="margin-top:6px">※ 제작·배송 조건에 따라 최종 결제금액이 달라질 수 있습니다.</div>
    <div class="actions">
      <button class="secondary" id="copyBtn">견적내용 복사</button>
      <a class="btn dark" id="orderBtn" target="_blank" rel="noopener" href="https://kdjavara.kr/product/테스트-sus-셀프-시공-304스테인리스-방범창-완조립제품-스텐-창문-셀프-설치-맞춤-제작/775/category/52/display/1/">계산한 사양으로 주문하기</a>
    </div>
  </div>
</div>
<script>
const TABLES = {
  "201": [[54, 60, 66, 72, 78, 84, 90, 96, 102, 108, 114, 120, 126, 132, 138, 144], [60, 67, 73, 80, 87, 93, 100, 107, 113, 120, 127, 133, 140, 147, 153, 160], [66, 73, 81, 88, 95, 103, 110, 117, 125, 132, 139, 147, 154, 161, 169, 176], [72, 80, 88, 96, 104, 112, 120, 128, 136, 144, 152, 160, 168, 176, 184, 192], [78, 87, 95, 104, 113, 121, 130, 139, 147, 156, 165, 173, 182, 191, 199, 208], [84, 93, 103, 112, 121, 131, 140, 149, 159, 168, 177, 187, 196, 205, 215, 224], [90, 100, 110, 120, 130, 140, 150, 160, 170, 180, 190, 200, 210, 220, 230, 240], [96, 107, 117, 128, 139, 149, 160, 171, 181, 192, 203, 213, 224, 235, 245, 256], [102, 113, 125, 136, 147, 159, 170, 181, 193, 204, 215, 227, 238, 249, 261, 272], [108, 120, 132, 144, 156, 168, 180, 192, 204, 216, 228, 240, 252, 264, 276, 288], [114, 127, 139, 152, 165, 177, 190, 203, 215, 228, 241, 253, 266, 279, 291, 304], [120, 133, 147, 160, 173, 187, 200, 213, 227, 240, 253, 267, 280, 293, 307, 320], [126, 140, 154, 168, 182, 196, 210, 224, 238, 252, 266, 280, 294, 308, 322, 336], [132, 147, 161, 176, 191, 205, 220, 235, 249, 264, 279, 293, 308, 323, 337, 352], [138, 153, 169, 184, 199, 215, 230, 245, 261, 276, 291, 307, 322, 337, 353, 368], [144, 160, 176, 192, 208, 224, 240, 256, 272, 288, 304, 320, 336, 352, 368, 384]],
  "304": [[63, 70, 77, 84, 91, 98, 105, 112, 119, 126, 133, 140, 147, 154, 161, 168], [70, 78, 86, 93, 101, 109, 117, 124, 132, 140, 148, 156, 163, 171, 179, 187], [77, 86, 94, 103, 111, 120, 128, 137, 145, 154, 163, 171, 180, 188, 197, 205], [84, 93, 103, 112, 121, 131, 140, 149, 159, 168, 177, 187, 196, 205, 215, 224], [91, 101, 111, 121, 131, 142, 152, 162, 172, 182, 192, 202, 212, 222, 233, 243], [98, 109, 120, 131, 142, 152, 163, 174, 185, 196, 207, 218, 229, 240, 250, 261], [105, 117, 128, 140, 152, 163, 175, 187, 198, 210, 222, 233, 245, 257, 268, 280], [112, 124, 137, 149, 162, 174, 187, 199, 212, 224, 236, 249, 261, 274, 286, 299], [119, 132, 145, 159, 172, 185, 198, 212, 225, 238, 251, 264, 278, 291, 304, 317], [126, 140, 154, 168, 182, 196, 210, 224, 238, 252, 266, 280, 294, 308, 322, 336], [133, 148, 163, 177, 192, 207, 222, 236, 251, 266, 281, 296, 310, 325, 340, 355], [140, 156, 171, 187, 202, 218, 233, 249, 264, 280, 296, 311, 327, 342, 358, 373], [147, 163, 180, 196, 212, 229, 245, 261, 278, 294, 310, 327, 343, 359, 376, 392], [154, 171, 188, 205, 222, 240, 257, 274, 291, 308, 325, 342, 359, 376, 394, 411], [161, 179, 197, 215, 233, 250, 268, 286, 304, 322, 340, 358, 376, 394, 411, 429], [168, 187, 205, 224, 243, 261, 280, 299, 317, 336, 355, 373, 392, 411, 429, 448]]
};
const BASE = {"201":54000,"304":63000};
let items = [];

const $ = id => document.getElementById(id);
const money = n => Number(n||0).toLocaleString("ko-KR")+"원";

function material(){
  return document.querySelector('input[name="material"]:checked').value;
}
function indexFor(mm){
  if (!Number.isFinite(mm) || mm < 1 || mm > 2400) return -1;
  if (mm <= 900) return 0;
  return Math.ceil((mm - 900) / 100);
}
function quote(mat,w,h){
  const ci=indexFor(w), ri=indexFor(h);
  if(ci<0||ri<0) return null;
  return TABLES[mat][ri][ci]*1000;
}
function current(){
  const mat=material(), w=Number($("width").value), h=Number($("height").value), qty=Math.max(1,Number($("qty").value)||1);
  const unit=quote(mat,w,h);
  return {mat,w,h,qty,unit,subtotal:unit===null?0:unit*qty};
}
function update(){
  const x=current();
  $("rMaterial").textContent="SUS"+x.mat;
  $("rUnit").textContent=x.unit===null?"계산 불가":money(x.unit);
  $("rSubtotal").textContent=x.unit===null?"0원":money(x.subtotal);
  if(!x.w||!x.h) $("guide").textContent=`SUS${x.mat} 기본가 ${money(BASE[x.mat])} · 가로와 세로를 입력하세요.`;
  else if(x.unit===null) $("guide").textContent="가로·세로는 각각 1~2,400mm까지만 계산할 수 있습니다.";
  else {
    const c=indexFor(x.w), r=indexFor(x.h);
    const range=i=>i===0?"~900":`${901+(i-1)*100}~${900+i*100}`;
    $("guide").textContent=`적용 구간: 가로 ${range(c)}mm × 세로 ${range(r)}mm`;
  }
}
function render(){
  const tbody=$("list");
  if(!items.length) tbody.innerHTML='<tr><td colspan="8" class="empty">창문을 추가해주세요.</td></tr>';
  else tbody.innerHTML=items.map((x,i)=>`<tr>
    <td>${i+1}</td><td>SUS${x.mat}</td><td>${x.w.toLocaleString()}</td><td>${x.h.toLocaleString()}</td>
    <td>${x.qty}</td><td>${money(x.unit)}</td><td><strong>${money(x.subtotal)}</strong></td>
    <td><button class="delete" onclick="removeItem(${i})">삭제</button></td></tr>`).join("");
  $("grandTotal").textContent=money(items.reduce((s,x)=>s+x.subtotal,0));
}
function removeItem(i){items.splice(i,1);render();}
window.removeItem=removeItem;

document.querySelectorAll('input[name="material"]').forEach(el=>el.addEventListener("change",()=>{
  document.querySelectorAll(".material").forEach(x=>x.classList.remove("active"));
  el.closest(".material").classList.add("active");
  update();
}));
["width","height","qty"].forEach(id=>$(id).addEventListener("input",update));

$("addBtn").addEventListener("click",()=>{
  const x=current();
  if(!x.w||!x.h) return alert("가로와 세로를 입력해주세요.");
  if(x.unit===null) return alert("가로·세로는 각각 1~2,400mm 범위로 입력해주세요.");
  items.push(x); render();
});

$("copyBtn").addEventListener("click",async()=>{
  if(!items.length) return alert("먼저 창문을 추가해주세요.");
  const total=items.reduce((s,x)=>s+x.subtotal,0);
  const lines=["[강동자바라 스텐 방범창 견적]"];
  items.forEach((x,i)=>lines.push(`${i+1}. SUS${x.mat} / ${x.w}×${x.h}mm / ${x.qty}개 / ${money(x.subtotal)}`));
  lines.push(`총 예상금액: ${money(total)}`);
  lines.push("※ 최종금액은 제작·배송 조건 확인 후 확정");
  try{await navigator.clipboard.writeText(lines.join("\n"));alert("견적내용을 복사했습니다.");}
  catch(e){prompt("아래 내용을 복사해주세요.",lines.join("\n"));}
});
$("orderBtn").addEventListener("click",(e)=>{
  if(items.length) $("copyBtn").click();
});
update(); render();
</script>
</body>
</html>
